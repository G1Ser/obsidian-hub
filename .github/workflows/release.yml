name: Release Plugin

on:
  push:
    tags:
      - "*@*"

# 给 GITHUB_TOKEN 开写权限，否则无法创建 Release
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable pnpm

      - run: pnpm install

      - name: Parse tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          PLUGIN="${TAG%@*}"
          VERSION="${TAG##*@}"
          echo "plugin=$PLUGIN" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build plugin
        run: |
          cd plugins/${{ steps.tag.outputs.plugin }}
          node esbuild.config.mjs

      - name: Package release zip
        run: |
          cd plugins/${{ steps.tag.outputs.plugin }}/dist
          zip -r ../../../${{ steps.tag.outputs.plugin }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.plugin }} ${{ steps.tag.outputs.version }}"
          files: ${{ steps.tag.outputs.plugin }}.zip
