name: Release Plugin

# 推送 tags 格式：<plugin-name>@<version>
# 例如：git tag obsidian-attachment@v2.0.0
# 效果：构建该插件，生成 zip 并创建 GitHub Release

on:
  push:
    tags:
      - "*@*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      # 从 tag 中解析插件名和版本号
      # obsidian-attachment@v2.0.0 → plugin=obsidian-attachment, version=v2.0.0
      - name: Parse tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          PLUGIN="${TAG%@*}"
          VERSION="${TAG##*@}"
          echo "plugin=$PLUGIN" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 只构建目标插件，不构建全部
      - name: Build plugin
        run: |
          cd plugins/${{ steps.tag.outputs.plugin }}
          node esbuild.config.mjs

      # 打包 dist/ 为 zip
      - name: Package release zip
        run: |
          cd plugins/${{ steps.tag.outputs.plugin }}/dist
          zip -r ../../../${{ steps.tag.outputs.plugin }}.zip .

      # 创建 GitHub Release 并上传 zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.plugin }} ${{ steps.tag.outputs.version }}"
          files: ${{ steps.tag.outputs.plugin }}.zip
