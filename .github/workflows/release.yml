name: Release Plugin

# 推送 tags 格式：<plugin-name>@<version>
# git tag obsidian-attachment@v2.0.0 && git push origin obsidian-attachment@v2.0.0

on:
  push:
    tags:
      - "*@*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 通过 corepack 启用 pnpm（Node.js 内置，无需额外 action）
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable pnpm

      - run: pnpm install

      # 从 tag 解析插件名和版本号
      # obsidian-attachment@v2.0.0 → plugin=obsidian-attachment, version=v2.0.0
      - name: Parse tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          PLUGIN="${TAG%@*}"
          VERSION="${TAG##*@}"
          echo "plugin=$PLUGIN" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build plugin
        run: |
          cd plugins/${{ steps.tag.outputs.plugin }}
          node esbuild.config.mjs

      - name: Package release zip
        run: |
          cd plugins/${{ steps.tag.outputs.plugin }}/dist
          zip -r ../../../${{ steps.tag.outputs.plugin }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.plugin }} ${{ steps.tag.outputs.version }}"
          files: ${{ steps.tag.outputs.plugin }}.zip
